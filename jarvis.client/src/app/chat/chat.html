<div class="hud-root">

  <!-- scanline overlay -->
  <div class="scanlines"></div>

  <!-- corner brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- top bar -->
  <div class="hud-topbar">
    <span class="hud-topbar-item">STARK INDUSTRIES</span>
    <span class="hud-topbar-sep">|</span>
    <span class="hud-topbar-item">SYSTEM ONLINE</span>
    <span class="hud-topbar-sep">|</span>
    <span class="hud-topbar-item hud-clock">{{ clock }}</span>
  </div>

  <!-- centre ring assembly -->
  <div class="hud-center">
    <div class="ring ring-outer" [class.ring-pulse]="speaking"></div>
    <div class="ring ring-mid" [class.ring-spin]="listening"></div>
    <div class="ring ring-inner"></div>
    <div class="arc arc-1"></div>
    <div class="arc arc-2"></div>

    <div class="core" [class.core-active]="listening || speaking">
      <div class="core-glow"></div>
      <svg class="core-icon" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="18" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="30" cy="30" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <line x1="30" y1="8"  x2="30" y2="14" stroke="currentColor" stroke-width="1.5"/>
        <line x1="30" y1="46" x2="30" y2="52" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8"  y1="30" x2="14" y2="30" stroke="currentColor" stroke-width="1.5"/>
        <line x1="46" y1="30" x2="52" y2="30" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </div>


  </div>

  <!-- loading indicator -->
  <div *ngIf="loading" class="hud-loading">
    <div class="hud-spinner"></div>
    <span class="hud-loading-text">PROCESSING REQUEST</span>
  </div>

  <!-- title -->
  <div class="hud-title">J.A.R.V.I.S</div>
  <div class="hud-subtitle">Just A Rather Very Intelligent System</div>

  <!-- error -->
  <div *ngIf="error" class="hud-error">
    <span class="hud-error-icon">!</span> {{ error }}
  </div>

  <!-- bottom bar -->
  <div class="hud-bottombar">
    <div class="hud-bar-segment">
      <span class="bar-label">VOICE</span>
      <div class="bar-track"><div class="bar-fill" [style.width.%]="listening ? 100 : 0"></div></div>
    </div>
    <div class="hud-bar-segment">
      <span class="bar-label">PROCESS</span>
      <div class="bar-track"><div class="bar-fill" [style.width.%]="loading ? 100 : 0"></div></div>
    </div>
    <div class="hud-bar-segment">
      <span class="bar-label">OUTPUT</span>
      <div class="bar-track"><div class="bar-fill" [style.width.%]="speaking ? 100 : 0"></div></div>
    </div>
    <button class="hud-new-session-btn" (click)="newSession()" [disabled]="loading" title="Clear conversation memory">
      NEW SESSION
    </button>
    <span class="hud-bottombar-right">MARK I &nbsp;|&nbsp; NEURAL CORE v2.1</span>
  </div>

</div>
