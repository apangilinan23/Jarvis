<div class="chat-container">
  <h1 class="chat-title">Jarvis</h1>

  <div class="input-row">
    <input
      type="text"
      [(ngModel)]="message"
      (keyup.enter)="send()"
      placeholder="Ask Jarvis anything..."
      [disabled]="loading"
      class="message-input"
    />
    <button *ngIf="speechSupported" (click)="toggleListening()" [disabled]="loading"
      class="mic-btn" [class.mic-active]="listening" title="Speak your message">
      <svg *ngIf="!listening" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-2.07A7 7 0 0 0 19 12h-2z"/>
      </svg>
      <span *ngIf="listening" class="btn-spinner mic-spinner"></span>
    </button>
    <button (click)="send()" [disabled]="loading || !message.trim()" class="send-btn">
      <span *ngIf="!loading">Send</span>
      <span *ngIf="loading" class="btn-spinner"></span>
    </button>
  </div>

  <div *ngIf="loading" class="loading-area">
    <div class="spinner"></div>
    <span class="loading-text">Thinking...</span>
  </div>

  <div *ngIf="error" class="error">
    <span class="error-icon">&#9888;</span> {{ error }}
  </div>

  <div *ngIf="hasReply" class="reply">
    <div class="reply-header">
      <span class="reply-label">Response</span>
    </div>
    <div class="reply-body" [innerHTML]="replyHtml"></div>
  </div>
</div>
